<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Letter to Self · Tranquil Edge Retreat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Marcellus+SC&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink-deepest: #0a0a0c;
    --ink-deep: #14141a;
    --ink-medium: #1f1f28;
    --ink-soft: #2a2a35;
    --ink-line: #3a3a47;
    --paper: #e8e2d5;
    --paper-soft: #ebe2d2;
    --paper-dim: #a8a294;
    --paper-faded: #c0b6a0;
    --ember: #c4773a;
    --ember-deep: #9a5a26;
    --ember-bright: #d4884a;
    --rust: #8b3a1f;
    --gold: #c9a661;
    --gold-deep: #9a7a40;
    --serif-display: 'Cormorant Garamond', 'Garamond', serif;
    --serif-small-caps: 'Marcellus SC', 'Cormorant SC', serif;
    --serif-body: 'Lora', 'Garamond', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--ink-deepest);
    color: var(--paper);
    font-family: var(--serif-body);
    font-size: 17px;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.06;
    z-index: 1;
    mix-blend-mode: overlay;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, var(--ink-deepest) 100%);
    pointer-events: none;
    z-index: 1;
    opacity: 0.7;
  }

  .app {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header.topbar {
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--ink-line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--serif-small-caps);
    font-size: 0.92rem;
    letter-spacing: 0.14em;
    color: var(--paper);
    text-transform: uppercase;
  }
  header.topbar .mark { color: var(--ember); }

  main.stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.5rem;
  }

  .view {
    width: 100%;
    max-width: 680px;
    animation: fadeUp 0.5s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-family: var(--serif-small-caps);
    font-size: 0.78rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ember);
    text-align: center;
    margin-bottom: 1rem;
  }
  .title {
    font-family: var(--serif-display);
    font-weight: 500;
    font-size: clamp(2rem, 5vw, 2.8rem);
    line-height: 1.15;
    color: var(--paper);
    text-align: center;
    margin-bottom: 0.6rem;
  }
  .subtitle {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 1.15rem;
    color: var(--gold);
    text-align: center;
    margin-bottom: 2rem;
  }
  p {
    font-family: var(--serif-body);
    color: var(--paper);
    margin-bottom: 1.1rem;
    line-height: 1.7;
  }
  p em { color: var(--ember-bright); font-style: italic; }
  strong { color: var(--paper); font-weight: 500; }

  .ornament {
    color: var(--ember);
    text-align: center;
    letter-spacing: 0.5em;
    margin: 1.6rem 0;
    opacity: 0.85;
  }

  .meta {
    text-align: center;
    font-family: var(--serif-small-caps);
    font-size: 0.82rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 1.2rem 0 0.4rem;
  }

  .btn-row {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    flex-wrap: wrap;
    margin: 1.5rem 0 0.5rem;
  }
  .btn {
    appearance: none;
    background: var(--ember);
    color: var(--ink-deepest);
    border: none;
    padding: 0.95rem 2rem;
    font-family: var(--serif-small-caps);
    font-size: 0.92rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s ease, transform 0.2s ease;
  }
  .btn:hover { background: var(--ember-bright); }
  .btn:disabled { background: var(--ink-soft); color: var(--paper-faded); cursor: not-allowed; }
  .btn-secondary {
    background: transparent;
    color: var(--paper);
    border: 1px solid var(--ink-line);
  }
  .btn-secondary:hover {
    background: rgba(196, 119, 58, 0.06);
    border-color: var(--ember);
    color: var(--ember-bright);
  }

  .privacy-note {
    font-size: 0.95rem;
    font-style: italic;
    color: var(--paper-dim);
    text-align: center;
    line-height: 1.55;
    margin: 1.6rem auto 1.2rem;
    padding: 1rem 1.2rem;
    border-top: 1px solid var(--ink-line);
    border-bottom: 1px solid var(--ink-line);
    max-width: 540px;
  }
  .privacy-note strong { color: var(--paper); font-weight: 500; font-style: normal; }

  .companion-link {
    margin: 1.5rem auto 0.4rem;
    text-align: center;
    font-size: 0.95rem;
    color: var(--paper-dim);
    max-width: 540px;
  }
  .companion-link a {
    color: var(--ember);
    text-decoration: none;
    border-bottom: 1px solid var(--ember-deep);
    padding-bottom: 1px;
    font-weight: 500;
    transition: color 0.25s ease, border-color 0.25s ease;
  }
  .companion-link a:hover { color: var(--ember-bright); border-color: var(--ember-bright); }

  /* Field-based form */
  .field-block {
    margin-bottom: 1.6rem;
  }
  .field-label {
    font-family: var(--serif-display);
    font-weight: 500;
    font-size: 1.18rem;
    color: var(--paper);
    margin-bottom: 0.3rem;
    line-height: 1.3;
  }
  .field-hint {
    font-family: var(--serif-body);
    font-size: 0.9rem;
    color: var(--paper-dim);
    margin-bottom: 0.5rem;
    line-height: 1.5;
  }
  .field-area {
    width: 100%;
    background: var(--ink-deep);
    border: 1px solid var(--ink-line);
    color: var(--paper);
    font-family: var(--serif-body);
    font-size: 1rem;
    line-height: 1.7;
    padding: 0.85rem 1rem;
    resize: vertical;
    border-radius: 2px;
    min-height: 4.5em;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .field-area:focus {
    outline: none;
    border-color: var(--ember);
    background: var(--ink-medium);
  }
  .field-area.large { min-height: 8em; }
  .field-area::placeholder { color: var(--paper-faded); font-style: italic; }

  .save-status {
    margin-top: 0.6rem;
    text-align: right;
    font-family: var(--serif-small-caps);
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--paper-faded);
    min-height: 1.2em;
  }
  .save-status.saved { color: var(--gold); }
  .save-status.dirty { color: var(--ember-bright); }

  /* Arrive-first guided breathing + audio (lifted from inventory) */
  .guide-row {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    margin: 0.8rem 0 0.2rem;
  }
  .guide-btn {
    appearance: none;
    background: transparent;
    border: 1px solid var(--gold-deep);
    color: var(--gold);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--serif-body);
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
    flex-shrink: 0;
    padding: 0;
  }
  .guide-btn:hover { background: rgba(196, 165, 96, 0.1); border-color: var(--gold); }
  .guide-btn:focus { outline: none; box-shadow: 0 0 0 2px rgba(196, 165, 96, 0.3); }
  .guide-btn.active {
    background: var(--ember);
    border-color: var(--ember);
    color: var(--ink-deepest);
  }
  .guide-label {
    flex: 1;
    font-family: var(--serif-small-caps);
    font-size: 0.82rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--paper-dim);
  }
  .guide-counter {
    font-family: var(--serif-body);
    font-size: 0.9rem;
    color: var(--paper-dim);
    font-variant-numeric: tabular-nums;
    min-width: 2.5em;
    text-align: right;
  }
  .breath-visual {
    display: none;
    text-align: center;
    margin: 0.6rem 0 0.2rem;
    height: 170px;
  }
  .breath-visual.on { display: block; }
  .breath-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    margin: 0.2rem auto 0.6rem;
    background: radial-gradient(circle at 50% 45%, var(--ember-bright), var(--ember-deep) 65%, transparent 100%);
    opacity: 0.35;
    transform: scale(0.45);
    transition: transform 4s ease-in-out, opacity 4s ease-in-out;
  }
  .breath-circle.inhale {
    transform: scale(1.0);
    opacity: 0.9;
    transition-duration: 4s;
  }
  .breath-circle.exhale {
    transform: scale(0.45);
    opacity: 0.35;
    transition-duration: 6s;
  }
  .breath-cue {
    font-family: var(--serif-small-caps);
    font-size: 0.85rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ember-bright);
    min-height: 1.4em;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 1.2rem;
    color: var(--paper-dim);
    cursor: pointer;
    font-family: var(--serif-small-caps);
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.25s ease;
    background: transparent;
    border: none;
  }
  .back-link:hover { color: var(--ember); }

  footer.bottombar {
    padding: 1.2rem 2rem;
    border-top: 1px solid var(--ink-line);
    text-align: center;
    font-family: var(--serif-small-caps);
    font-size: 0.85rem;
    letter-spacing: 0.18em;
    color: var(--paper-dim);
    text-transform: uppercase;
  }

  .print-busy {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink-medium);
    border: 1px solid var(--ember);
    color: var(--paper);
    padding: 0.7rem 1.4rem;
    font-family: var(--serif-small-caps);
    font-size: 0.85rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    z-index: 1000;
    border-radius: 3px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
    pointer-events: none;
  }

  /* Composed letter shown only when printing */
  .print-letter { display: none; }

  @media (max-width: 640px) {
    body { font-size: 16px; }
    header.topbar { padding: 0.9rem 1.2rem; font-size: 0.82rem; }
    main.stage { padding: 1.5rem 1rem; }
    .btn-row { flex-direction: column; }
    .btn { width: 100%; text-align: center; }
  }

  @media print {
    @page { margin: 0.85in; }
    body, html {
      background: white !important;
      color: black !important;
      font-size: 12pt;
    }
    body::before, body::after { display: none !important; }
    .topbar, .bottombar, .btn-row, .back-link, .save-status,
    .privacy-note, .companion-link, .guide-row, .breath-visual,
    .meta, .ornament, .field-block, .no-print,
    .view > p, .view > .eyebrow, .view > .title, .view > .subtitle {
      display: none !important;
    }
    .stage { padding: 0 !important; max-width: 100% !important; }
    .view { animation: none !important; max-width: 100% !important; }
    .print-letter { display: block !important; color: black !important; }
    .print-letter-header {
      text-align: center;
      margin-bottom: 0.4in;
      border-bottom: 1px solid #ccc;
      padding-bottom: 0.18in;
    }
    .print-letter .print-eyebrow {
      font-family: 'Marcellus SC', serif;
      font-size: 9pt;
      color: #777 !important;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 0.05in;
    }
    .print-letter h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24pt;
      color: black !important;
      font-weight: 500;
      margin-bottom: 0.08in;
    }
    .print-letter .print-date {
      font-style: italic;
      color: #666 !important;
      font-size: 10pt;
    }
    .print-letter h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13pt;
      color: #444 !important;
      font-weight: 500;
      margin-top: 0.3in;
      margin-bottom: 0.08in;
      page-break-after: avoid;
    }
    .print-letter .print-section p {
      font-family: 'Lora', 'Garamond', serif;
      font-size: 11pt;
      color: black !important;
      margin-bottom: 0.1in;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .print-letter .print-section { page-break-inside: avoid; margin-bottom: 0.18in; }
    .print-letter .print-footer {
      margin-top: 0.5in;
      font-style: italic;
      color: #777 !important;
      font-size: 10pt;
      text-align: center;
      border-top: 1px solid #ccc;
      padding-top: 0.18in;
    }
  }
</style>
</head>
<body>
<div class="app">

<header class="topbar">
  <span><span class="mark">◆</span> Tranquil Edge Retreat</span>
  <span>Letter to Self</span>
</header>

<main class="stage" id="stage"></main>

<footer class="bottombar">
  Filipino Martial Arts Retreat · September 10 to 13, 2026 · River Mountain, PA
</footer>

</div>

<script>
/* ============================================================
   CONFIGURATION. Edit before deploying.
   ============================================================ */
const RELEASE_DATE = new Date('2026-05-14T00:00:00');
const DUE_DATE = new Date('2026-09-09T23:59:59');
const RETREAT_DATE = new Date('2026-09-10T00:00:00');
const STORAGE_KEY = 'tranquil-edge-letter-v1';

/* ============================================================
   FIELDS. The seven structured prompts that compose the letter.
   Each field has a key, label (the prompt itself), hint (smaller
   guidance text), placeholder (what shows in the empty box), and
   an optional `large` flag for the longer freeform field at the end.
   ============================================================ */
const FIELDS = [
  {
    key: 'pattern',
    label: 'The pattern I am ready to put down',
    hint: 'One sentence. Direct. No softeners.',
    placeholder: 'Example: I keep performing instead of being honest.',
  },
  {
    key: 'where',
    label: 'Where this pattern shows up most',
    hint: 'A relationship, a moment, a kind of decision. Be specific.',
    placeholder: 'It comes alive when...',
  },
  {
    key: 'protects',
    label: 'What this pattern has protected me from',
    hint: 'It is not random. Something is being kept safe by it.',
    placeholder: 'It has kept me from...',
  },
  {
    key: 'costs',
    label: 'What it has cost me',
    hint: 'And who else has paid the cost.',
    placeholder: 'The cost has been...',
  },
  {
    key: 'learned',
    label: 'Where I think I learned this',
    hint: 'Mine from the start, or inherited.',
    placeholder: 'I think I picked this up from...',
  },
  {
    key: 'makeRoom',
    label: 'What I want to make room for',
    hint: 'When this pattern stops running, what gets to live there?',
    placeholder: 'I want to make room for...',
  },
  {
    key: 'toSelf',
    label: 'What I want to say to myself',
    hint: 'The part no one else needs to hear. Speak to yourself directly.',
    placeholder: 'Dear me,',
    large: true,
  },
];

/* ============================================================
   STATE
   ============================================================ */
function emptyFields() {
  const f = {};
  FIELDS.forEach(field => { f[field.key] = ''; });
  return f;
}

const initialState = {
  view: 'welcome',
  fields: emptyFields(),
  startedAt: null,
  completedAt: null,
};
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(initialState));
    const parsed = JSON.parse(raw);
    const merged = JSON.parse(JSON.stringify(initialState));
    Object.assign(merged, parsed);
    merged.fields = { ...emptyFields(), ...(parsed.fields || {}) };
    // Migrate any earlier draft that used a single `letter` string
    if (parsed.letter && !merged.fields.toSelf) {
      merged.fields.toSelf = parsed.letter;
    }
    return merged;
  } catch (e) {
    return JSON.parse(JSON.stringify(initialState));
  }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function resetAll() {
  if (!confirm('Erase your letter and start over? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = JSON.parse(JSON.stringify(initialState));
  state.fields = emptyFields();
  render();
}

function hasAnyContent() {
  return FIELDS.some(f => (state.fields[f.key] || '').trim().length > 0);
}

/* ============================================================
   HELPERS
   ============================================================ */
const stage = document.getElementById('stage');

function shortDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function longDate(d) {
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]);
}

function composedLetterHtml() {
  const sections = FIELDS.map(f => {
    const val = (state.fields[f.key] || '').trim();
    const escaped = val
      ? escapeHtml(val).replace(/\n/g, '<br>')
      : '<em style="color: #999;">(left blank)</em>';
    return `
      <div class="print-section">
        <h2>${escapeHtml(f.label)}</h2>
        <p>${escaped}</p>
      </div>
    `;
  }).join('');
  return `
    <div class="print-letter">
      <div class="print-letter-header">
        <p class="print-eyebrow">Tranquil Edge Retreat</p>
        <h1>A Letter to Myself</h1>
        <p class="print-date">${longDate(new Date())}</p>
      </div>
      ${sections}
      <p class="print-footer">Written before the retreat. For my own use.</p>
    </div>
  `;
}

function composedLetterText() {
  const lines = [];
  lines.push('Tranquil Edge Retreat');
  lines.push('A Letter to Myself');
  lines.push(longDate(new Date()));
  lines.push('');
  FIELDS.forEach(f => {
    const val = (state.fields[f.key] || '').trim();
    lines.push(f.label);
    lines.push(val || '(left blank)');
    lines.push('');
  });
  lines.push('Written before the retreat. For my own use.');
  return lines.join('\n');
}

/* ============================================================
   RENDER
   ============================================================ */
function render() {
  if (state.view === 'welcome') renderWelcome();
  else if (state.view === 'prep') renderPrep();
  else if (state.view === 'write') renderWrite();
  else if (state.view === 'done') renderDone();
  else renderWelcome();
}

function renderWelcome() {
  const view = document.createElement('div');
  view.className = 'view';

  const now = new Date();
  const beforeRelease = now < RELEASE_DATE;
  const hasDraft = hasAnyContent();
  const isComplete = !!state.completedAt;

  let metaLine;
  if (beforeRelease) metaLine = `Opens ${shortDate(RELEASE_DATE)}`;
  else if (isComplete) metaLine = `Letter saved ${shortDate(new Date(state.completedAt))}. Revise anytime.`;
  else if (hasDraft) metaLine = `Draft in progress. Continue when ready.`;
  else metaLine = `Available through the retreat`;

  let buttonRowHtml;
  if (beforeRelease) {
    buttonRowHtml = `<button class="btn" disabled>Opens ${shortDate(RELEASE_DATE)}</button>`;
  } else if (isComplete) {
    buttonRowHtml = `
      <button class="btn" onclick="goToWrite()">Read or revise</button>
      <button class="btn btn-secondary" onclick="goToDone()">Print or save</button>
    `;
  } else if (hasDraft) {
    buttonRowHtml = `
      <button class="btn" onclick="goToWrite()">Continue your draft</button>
      <button class="btn btn-secondary" onclick="goToPrep()">Sit with it first</button>
    `;
  } else {
    buttonRowHtml = `
      <button class="btn" onclick="goToWrite()">Open the form</button>
      <button class="btn btn-secondary" onclick="goToPrep()">Sit with it first</button>
    `;
  }

  view.innerHTML = `
    <div class="eyebrow">After the Audit</div>
    <h1 class="title">A Letter to Yourself</h1>
    <p class="subtitle">Short answers. Honest ones.</p>

    <p>The inventory let you see the pattern in shorthand. The audit let you see it in detail. This is the next piece. You write to yourself, in your own voice, about the one thing you are ready to put down.</p>

    <p>Below is a guided form. Seven short prompts. You answer one at a time. You do not have to fill every box. Each answer saves to your browser as you type, so you can leave and come back.</p>

    <p>What you write here you will bring with you to the retreat. We will use it there. Until then it stays with you.</p>

    <div class="meta">${metaLine}</div>

    <p class="privacy-note">
      <strong>About your privacy.</strong> The letter saves to your own browser, not a server. Nothing is sent to anyone. You can revise as many times as you want, print it, or save it as a text file.
    </p>

    <div class="btn-row">
      ${buttonRowHtml}
    </div>

    <p class="companion-link">If you have not done the others yet, the <a href="../kalooban-quiz/">swipe inventory</a> takes about ten minutes and the <a href="../karmic-audit/">private audit</a> goes deeper.</p>
  `;
  stage.innerHTML = '';
  stage.appendChild(view);
}

function renderPrep() {
  const view = document.createElement('div');
  view.className = 'view';

  view.innerHTML = `
    <button class="back-link" onclick="goToWelcome()">← Back</button>
    <div class="eyebrow">Arrive First</div>
    <h1 class="title">Sit with what you found.</h1>
    <p class="subtitle">Optional. Skip if you are short on time.</p>

    <p>Find a quiet place where no one will interrupt you for the next thirty minutes. Sit comfortably. Put your phone face down somewhere it will not pull at you, then pick it up again only for this.</p>

    <p>The pattern you are about to name has been with you a long time. It deserves a few breaths first. Use the tools below if they help. Skip them if they do not.</p>

    <div class="guide-row">
      <button class="guide-btn" id="breath-btn" onclick="toggleBreathing()" aria-label="Start guided breathing"><span class="icon">▶</span></button>
      <span class="guide-label">Guided breathing &nbsp;·&nbsp; three cycles</span>
      <span class="guide-counter" id="breath-counter"></span>
    </div>
    <div class="breath-visual" id="breath-visual">
      <div class="breath-circle" id="breath-circle"></div>
      <div class="breath-cue" id="breath-cue">Ready</div>
    </div>

    <div class="guide-row">
      <button class="guide-btn" id="ocean-btn" onclick="toggleOcean()" aria-label="Play ocean sounds for one minute"><span class="icon">▶</span></button>
      <span class="guide-label">Ocean sounds &nbsp;·&nbsp; one minute</span>
      <span class="guide-counter" id="ocean-counter">1:00</span>
    </div>
    <audio id="ocean-audio" src="audio/waves-60s.mp3" preload="none"></audio>

    <div class="ornament">◆ ◇ ◆</div>

    <div class="btn-row">
      <button class="btn" onclick="goToWrite()">Open the form</button>
    </div>
  `;
  stage.innerHTML = '';
  stage.appendChild(view);
}

function renderWrite() {
  const view = document.createElement('div');
  view.className = 'view';

  if (!state.startedAt) {
    state.startedAt = new Date().toISOString();
    saveState();
  }

  const fieldsHtml = FIELDS.map(f => `
    <div class="field-block">
      <div class="field-label">${escapeHtml(f.label)}</div>
      <div class="field-hint">${escapeHtml(f.hint)}</div>
      <textarea
        class="field-area${f.large ? ' large' : ''}"
        data-field="${f.key}"
        placeholder="${escapeHtml(f.placeholder || '')}"
        oninput="onFieldInput('${f.key}', this.value)"
      >${escapeHtml(state.fields[f.key] || '')}</textarea>
    </div>
  `).join('');

  view.innerHTML = `
    <button class="back-link" onclick="goToWelcome()">← Back to welcome</button>
    <div class="eyebrow">The Letter</div>
    <h1 class="title">Fill in what is true.</h1>
    <p class="subtitle">No one else will read this.</p>

    <p style="text-align: center; color: var(--paper-dim);">Answer one prompt at a time. Skip any that do not fit. Each box saves as you type. Take as long as you want.</p>

    ${fieldsHtml}

    <div class="save-status saved" id="save-status">Saved</div>

    <div class="btn-row">
      <button class="btn" onclick="markWritten()">My letter is ready</button>
      <button class="btn btn-secondary" onclick="goToWelcome()">Pause and come back</button>
    </div>

    <p class="privacy-note">
      <strong>This stays with you.</strong> Each answer saves to your browser as you type. Nothing is sent. You can leave this tab and return later.
    </p>

    ${composedLetterHtml()}
  `;
  stage.innerHTML = '';
  stage.appendChild(view);
}

function renderDone() {
  const view = document.createElement('div');
  view.className = 'view';

  const completedDate = state.completedAt ? shortDate(new Date(state.completedAt)) : '';
  const filledCount = FIELDS.filter(f => (state.fields[f.key] || '').trim().length > 0).length;

  view.innerHTML = `
    <div class="eyebrow">Saved</div>
    <h1 class="title">Your letter is written.</h1>
    <p class="subtitle">${completedDate ? `Completed ${completedDate}.` : 'Saved to your browser.'}</p>

    <p style="text-align: center;">${filledCount} of ${FIELDS.length} prompts answered. You can read it again, revise it, print it, or save it as a text file.</p>

    <div class="btn-row">
      <button class="btn" onclick="goToWrite()">Read or revise</button>
      <button class="btn btn-secondary" onclick="printLetter()">Print the letter</button>
      <button class="btn btn-secondary" onclick="downloadLetter()">Save as text file</button>
    </div>

    <div class="ornament">◆ ◇ ◆</div>

    <p>You can come back to revise this any time before the retreat. Bring whichever version of it you trust most. We will use what you wrote when you arrive.</p>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goToWelcome()">Close</button>
      <button class="btn btn-secondary" onclick="resetAll()" style="border-color: var(--rust); color: var(--rust);">Erase and start over</button>
    </div>

    <p class="privacy-note">If you close this tab, the letter stays in your browser. You can return anytime to read, revise, or print it.</p>

    ${composedLetterHtml()}
  `;
  stage.innerHTML = '';
  stage.appendChild(view);
}

/* ============================================================
   ACTIONS
   ============================================================ */
function goToWelcome() {
  stopBreathing();
  stopOcean();
  state.view = 'welcome';
  saveState();
  render();
}

function goToPrep() {
  state.view = 'prep';
  saveState();
  render();
}

function goToWrite() {
  stopBreathing();
  stopOcean();
  state.view = 'write';
  saveState();
  render();
}

function goToDone() {
  if (!state.completedAt) state.completedAt = new Date().toISOString();
  state.view = 'done';
  saveState();
  render();
}

function markWritten() {
  if (!hasAnyContent()) {
    if (!confirm('You have not filled in any of the prompts yet. Mark the letter ready anyway?')) return;
  }
  state.completedAt = new Date().toISOString();
  state.view = 'done';
  saveState();
  render();
}

let saveTimer = null;
function onFieldInput(key, value) {
  state.fields[key] = value;
  const status = document.getElementById('save-status');
  if (status) {
    status.textContent = 'Saving...';
    status.classList.remove('saved');
    status.classList.add('dirty');
  }
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveState();
    if (status) {
      status.textContent = 'Saved';
      status.classList.remove('dirty');
      status.classList.add('saved');
    }
  }, 400);
}

function downloadLetter() {
  const text = composedLetterText();
  const stamp = new Date().toISOString().slice(0, 10);
  const blob = new Blob([text + '\n'], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `letter-to-self-${stamp}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function printLetter() {
  showPrintBusy('Preparing print...');
  // The composed letter HTML is already in the DOM on both write and done views.
  // Just trigger the print after one paint.
  requestAnimationFrame(() => {
    showPrintBusy('Opening printer dialog...');
    requestAnimationFrame(() => { window.print(); });
  });
}

function showPrintBusy(label) {
  document.body.style.cursor = 'wait';
  let el = document.getElementById('print-busy');
  if (!el) {
    el = document.createElement('div');
    el.id = 'print-busy';
    el.className = 'print-busy no-print';
    document.body.appendChild(el);
  }
  el.textContent = label || 'Opening printer dialog...';
}

function hidePrintBusy() {
  document.body.style.cursor = '';
  const el = document.getElementById('print-busy');
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

window.addEventListener('afterprint', hidePrintBusy);

/* ============================================================
   Arrive-first guided breathing (lifted from inventory)
   ============================================================ */
let breathTimer = null;
let breathStep = 0;
const BREATH_CYCLES = 3;

function toggleBreathing() {
  if (breathTimer) stopBreathing();
  else startBreathing();
}

function startBreathing() {
  const btn = document.getElementById('breath-btn');
  const visual = document.getElementById('breath-visual');
  if (!btn || !visual) return;
  btn.classList.add('active');
  btn.querySelector('.icon').textContent = '■';
  visual.classList.add('on');
  breathStep = 0;
  breathTick();
}

function breathTick() {
  const circle = document.getElementById('breath-circle');
  const cue = document.getElementById('breath-cue');
  const counter = document.getElementById('breath-counter');
  if (!circle || !cue) { stopBreathing(); return; }
  const cycle = Math.floor(breathStep / 2);
  if (cycle >= BREATH_CYCLES) {
    cue.textContent = 'Settled';
    if (counter) counter.textContent = '';
    breathTimer = setTimeout(stopBreathing, 1500);
    return;
  }
  const isInhale = breathStep % 2 === 0;
  if (counter) counter.textContent = `${cycle + 1} of ${BREATH_CYCLES}`;
  if (isInhale) {
    circle.classList.remove('exhale');
    circle.classList.add('inhale');
    cue.textContent = 'Inhale';
    breathTimer = setTimeout(() => { breathStep++; breathTick(); }, 4000);
  } else {
    circle.classList.remove('inhale');
    circle.classList.add('exhale');
    cue.textContent = 'Exhale';
    breathTimer = setTimeout(() => { breathStep++; breathTick(); }, 6000);
  }
}

function stopBreathing() {
  if (breathTimer) { clearTimeout(breathTimer); breathTimer = null; }
  breathStep = 0;
  const btn = document.getElementById('breath-btn');
  const visual = document.getElementById('breath-visual');
  const circle = document.getElementById('breath-circle');
  const cue = document.getElementById('breath-cue');
  const counter = document.getElementById('breath-counter');
  if (btn) { btn.classList.remove('active'); const i = btn.querySelector('.icon'); if (i) i.textContent = '▶'; }
  if (visual) visual.classList.remove('on');
  if (circle) circle.classList.remove('inhale', 'exhale');
  if (cue) cue.textContent = 'Ready';
  if (counter) counter.textContent = '';
}

/* ============================================================
   Ocean sounds (lifted from inventory)
   ============================================================ */
let oceanTimer = null;

function toggleOcean() {
  const audio = document.getElementById('ocean-audio');
  if (!audio) return;
  if (oceanTimer) stopOcean();
  else startOcean();
}

function startOcean() {
  const audio = document.getElementById('ocean-audio');
  const btn = document.getElementById('ocean-btn');
  const counter = document.getElementById('ocean-counter');
  if (!audio || !btn) return;
  audio.currentTime = 0;
  const playPromise = audio.play();
  if (playPromise && playPromise.catch) playPromise.catch(() => stopOcean());
  btn.classList.add('active');
  btn.querySelector('.icon').textContent = '■';
  const updateCounter = () => {
    if (!oceanTimer) return;
    const remaining = Math.max(0, 60 - Math.floor(audio.currentTime));
    if (counter) counter.textContent = `0:${String(remaining).padStart(2, '0')}`;
    if (remaining <= 0 || audio.ended) { stopOcean(); return; }
    oceanTimer = setTimeout(updateCounter, 250);
  };
  oceanTimer = setTimeout(updateCounter, 50);
}

function stopOcean() {
  const audio = document.getElementById('ocean-audio');
  const btn = document.getElementById('ocean-btn');
  const counter = document.getElementById('ocean-counter');
  if (oceanTimer) { clearTimeout(oceanTimer); oceanTimer = null; }
  if (audio) { try { audio.pause(); audio.currentTime = 0; } catch (e) {} }
  if (btn) { btn.classList.remove('active'); const i = btn.querySelector('.icon'); if (i) i.textContent = '▶'; }
  if (counter) counter.textContent = '1:00';
}

/* ============================================================
   EXPORTS
   ============================================================ */
window.goToWelcome = goToWelcome;
window.goToPrep = goToPrep;
window.goToWrite = goToWrite;
window.goToDone = goToDone;
window.markWritten = markWritten;
window.onFieldInput = onFieldInput;
window.downloadLetter = downloadLetter;
window.printLetter = printLetter;
window.toggleBreathing = toggleBreathing;
window.toggleOcean = toggleOcean;
window.resetAll = resetAll;

render();
</script>
